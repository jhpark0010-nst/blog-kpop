name: Reviewer (사후 감사)

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: reviewer
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: Reviewer 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL: ${{ secrets.CLAUDE_MODEL }}
          CLAUDE_MODEL_REVIEW: ${{ secrets.CLAUDE_MODEL_REVIEW }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/review.py

      - name: Apply FIX to WP (inline — review-apply workflow 가 GITHUB_TOKEN push 로 트리거 안 되므로)
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scripts/apply_review_actions.py

      - name: review-actions.json 커밋 (FIX 생성+적용 결과)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/review-actions.json
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            TIMESTAMP=$(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')
            git commit -m "review: ${TIMESTAMP} (FIX 생성+적용)"
            git pull --rebase origin main
            git push
          fi
